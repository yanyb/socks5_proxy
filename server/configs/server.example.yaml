# Server-only config. Copy to server.yaml and edit.
# Field names match JSON you might serve from an admin API (see server/config ParseServerJSON).

# SOCKS5 for users (browsers, apps pointing at this proxy)
socks_listen: "127.0.0.1:1080"
# Devices (phones) dial in with TLS; yamux runs on top.
device_listen: "0.0.0.0:8443"
tls_cert_file: "server/configs/server.crt"
tls_key_file: "server/configs/server.key"
# SOCKS5 credentials precedence:
#   1. If socks_credentials_file is set, the server loads {user: password} pairs from
#      that JSON file at startup, refreshes the cache every socks_credentials_refresh,
#      and uses it for SOCKS5 auth. (Future: replace with admin-service URL.)
#   2. Else if socks_auth_password is set, all users share this single password,
#      username = device_id.
#   3. Else no auth (only valid if exactly one device is connected).
socks_auth_password: ""
socks_credentials_file: ""        # e.g. "server/configs/credentials.json"
socks_credentials_refresh: 1m
# Optional: drop device session if no app-level heartbeat within this duration (0 = disable).
session_heartbeat_timeout: 90s
# Wait for a device to register before failing SOCKS5 dial (0 = no wait).
device_wait_timeout: 30s
# After CONNECT is sent to device, wait for connect_result (TCP dial on phone).
connect_result_timeout: 30s
# How long graceful shutdown waits for in-flight goroutines (devices + SOCKS connections).
shutdown_timeout: 10s
# Logging (logrus). Level: trace|debug|info|warn|error. Format: text|json.
log_level: "info"
log_format: "text"
# Where each log stream is written. "" or "stdout" -> stdout; "stderr" -> stderr;
# any other value is treated as a file path (opened in append mode).
# Even when both go to the same destination, entries carry stream=device or stream=socks.
device_log_file: ""   # device tunnel: register / heartbeat / accept / yamux
socks_log_file:  ""   # SOCKS5 server: per-connection dial through device, socks5 lib errors
